    <body>
      <div class="form">
        <h1>Inscrivez-vous</h1>
        <form action="enregistrerEleve.php" method="POST">
          <div class="input-container ic1">
            <input type="text" name="prenom" class="input" placeholder=" " required/>
            <div class="cut"></div>
            <label for="prenom" class="placeholder">Prénom*</label>
            </div>
            <div class="input-container ic2">
              <input  type="text" name="nom" class="input" placeholder=" " required/>
              <div class="cut"></div>
              <label for="nom" class="placeholder">Nom*</label>
            </div>
            <div class="input-container ic2">
              <input  input type="email" id="email" name="email" pattern=".+@cy-tech.fr" size="30" class="input" placeholder=" " required/>
              <div class="cut"></div>
              <label for="email" class="placeholder">Email CY*</label>
            </div>
            <div class="input-container ic1">
              <input input type="text" name="pseudo" class="input" placeholder=" " required/>
              <div class="cut"></div>
                <label for="pseudo" class="placeholder">Pseudo*</label>
            </div>
            <div class="input-container ic2">
              <input type="password" name="password" class="input" placeholder=" " required/>
              <div class="cut"></div>
              <label for="password" class="placeholder">Mot de passe*</label>
            </div>
            <div class="input-container ic2">
              <label for="pp" class="inputPP">Photo de profil</label>
              <div class="small-12 medium-2 large-2 columns">
                <div class="circle">
                  <img class="profile-pic" src="https://t3.ftcdn.net/jpg/03/46/83/96/360_F_346839683_6nAPzbhpSkIpb8pmAwufkC7c5eD7wYws.jpg">
                </div>

                <input class="input" type="file" name="pp" id="pp" accept="image/*" placeholder=" " required />
                <div class="cut"></div>
                <label for="password" class="placeholder">Photo de profil</label>
               
              <script type="text/javascript" src="photo.js"></script>
            <p><input type="submit" value="Inscription" class="submit" required></p>

        </form>
      </div>
